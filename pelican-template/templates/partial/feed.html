{%- if FEED_ALL_ATOM %}
<link rel="alternate" type="application/atom+xml" title="{{ SITENAME }} (Atom)" href="{{ SITEURL }}/{{ FEED_ALL_ATOM }}" />
{%- endif %}
{%- if FEED_ALL_RSS %}
<link rel="alternate" type="application/rss+xml" title="{{ SITENAME }} (RSS)" href="{{ SITEURL }}/{{ FEED_ALL_RSS }}" />
{%- endif %}
{%- if CATEGORY_FEED_ATOM and category %}
<link rel="alternate" type="application/atom+xml" title="{{ SITENAME }} — {{ category }} (Atom)" href="{{ SITEURL }}/{{ CATEGORY_FEED_ATOM|format(slug=category|lower|replace(' ', '-')) }}" />
{%- endif %}
{%- if TAG_FEED_ATOM and tag %}
<link rel="alternate" type="application/atom+xml" title="{{ SITENAME }} — #{{ tag }} (Atom)" href="{{ SITEURL }}/{{ TAG_FEED_ATOM|format(slug=tag|lower|replace(' ', '-')) }}" />
{%- endif %}
