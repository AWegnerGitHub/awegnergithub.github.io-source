<meta property="og:site_name" content="{{ SITENAME }}" />
<meta property="og:type" content="{{ og_type|default('website') }}" />
<meta property="og:title" content="{{ self.title()|striptags|e if self.title else SITENAME }}" />
<meta property="og:url" content="{{ SITEURL }}/{{ _canonical_path }}" />
<meta property="og:description" content="{{ SITEDESCRIPTION|default(SITESUBTITLE|default('')) }}" />
{%- if SITELOGO %}
<meta property="og:image" content="https://andrewwegner.com/theme/img/wegner_headshot.png" />
{%- endif %}
<meta name="twitter:card" content="summary" />
